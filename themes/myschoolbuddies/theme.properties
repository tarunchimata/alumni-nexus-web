
# My School Buddies Keycloak Theme - Fixed Configuration
# Version: 2.2.1 - Production Ready with Bug Fixes

parent=base
import=common/keycloak

# Theme metadata
name=My School Buddies
displayName=My School Buddies Authentication Theme
description=Production-ready responsive theme for My School Buddies school community platform
version=2.2.1
author=My School Buddies Development Team

# Theme files - simplified configuration
styles=css/login.css css/custom.css
scripts=js/password-strength.js
locales=en,es,fr

# Theme customization
loginTheme=true
accountTheme=false
adminTheme=false
emailTheme=false
welcomeTheme=false

# Brand assets
logo.url=${url.resourcesPath}/img/logo.png
favicon.url=${url.resourcesPath}/img/favicon.ico
brand.name=My School Buddies
brand.tagline=Connect. Learn. Grow Together.

# Design system colors
primary.color=#3b82f6
primary.hover=#2563eb
secondary.color=#8b5cf6
success.color=#10b981
warning.color=#f59e0b
error.color=#ef4444
background.gradient=linear-gradient(135deg, #667eea 0%, #764ba2 100%)

# Core features
mobile.optimized=true
responsive.breakpoints=320,480,640,768,1024,1280
accessibility.enhanced=true
password.strength.enabled=true
form.validation.realtime=true

# Security
csrf.protection=true
xss.protection=true

# Production deployment
production.ready=true
deployment.environment=production

# Custom properties for school branding
school.platform.name=My School Buddies
school.support.email=support@myschoolbuddies.com
school.privacy.url=https://myschoolbuddies.com/privacy
school.terms.url=https://myschoolbuddies.com/terms
school.help.url=https://myschoolbuddies.com/help

# Theme versioning
theme.version=2.2.1
last.updated=2024-01-22
compatibility.keycloak.min=22.0.0
compatibility.keycloak.max=26.x.x
