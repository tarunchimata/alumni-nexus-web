
parent=keycloak.v2
import=common/keycloak

# Theme metadata
name=My School Buddies
displayName=My School Buddies Theme  
description=Custom responsive theme for My School Buddies school community platform with mobile-first design
version=2.1.0
author=My School Buddies Team

# Styling
styles=css/login.css css/custom.css
scripts=js/password-strength.js
locales=en

# Login theme customization
loginTheme=true
accountTheme=false
adminTheme=false
emailTheme=false

# Custom properties for dynamic branding
logo.url=${url.resourcesPath}/img/logo.png
favicon.url=${url.resourcesPath}/img/favicon.ico
background.gradient=true
primary.color=#3b82f6
secondary.color=#8b5cf6
brand.name=My School Buddies

# Mobile responsiveness
mobile.optimized=true
responsive.breakpoints=480,640,768,1024

# Security and accessibility
csrf.protection=true
accessibility.enhanced=true
password.strength.enabled=true

# Social login providers (ready for configuration)
social.google.enabled=false
social.github.enabled=false
social.facebook.enabled=false

# Features
features.password.strength=true
features.mobile.responsive=true
features.dark.mode=true
features.high.contrast=true
features.reduced.motion=true
