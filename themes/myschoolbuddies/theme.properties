
# My School Buddies Keycloak Theme - Production Configuration
# Version: 2.2.0 - Production Ready

parent=keycloak.v2
import=common/keycloak

# Theme metadata
name=My School Buddies
displayName=My School Buddies Authentication Theme
description=Production-ready responsive theme for My School Buddies school community platform with enhanced mobile support and accessibility features
version=2.2.0
author=My School Buddies Development Team

# Theme files
styles=css/login.css css/custom.css
scripts=js/password-strength.js
locales=en,es,fr

# Theme customization
loginTheme=true
accountTheme=false
adminTheme=false
emailTheme=false
welcomeTheme=false

# Brand assets
logo.url=${url.resourcesPath}/img/logo.png
favicon.url=${url.resourcesPath}/img/favicon.ico
brand.name=My School Buddies
brand.tagline=Connect. Learn. Grow Together.

# Design system
primary.color=#3b82f6
primary.hover=#2563eb
secondary.color=#8b5cf6
success.color=#10b981
warning.color=#f59e0b
error.color=#ef4444
background.gradient=linear-gradient(135deg, #667eea 0%, #764ba2 100%)

# Mobile responsiveness
mobile.optimized=true
responsive.breakpoints=320,480,640,768,1024,1280
touch.friendly=true
ios.zoom.prevention=true

# Security features
csrf.protection=true
xss.protection=true
content.security.policy=true
frame.options=DENY

# Accessibility
accessibility.enhanced=true
aria.labels=true
keyboard.navigation=true
screen.reader.support=true
high.contrast.mode=true
reduced.motion.support=true

# Password features
password.strength.enabled=true
password.strength.realtime=true
password.toggle.enabled=true
password.validation.realtime=true
password.requirements.display=true

# Form enhancements
form.validation.realtime=true
form.autocomplete.enabled=true
form.error.animation=true
form.loading.states=true
form.touch.optimization=true

# Social login providers (configured but disabled by default)
social.google.enabled=false
social.github.enabled=false
social.facebook.enabled=false
social.microsoft.enabled=false
social.apple.enabled=false

# Email customization
email.from.display.name=My School Buddies
email.reply.to.display.name=My School Buddies Support
email.theme.color=#3b82f6

# Internationalization
i18n.supported=true
default.locale=en
rtl.support=false

# Performance
css.minification=true
js.minification=true
image.optimization=true
caching.enabled=true
lazy.loading=true

# Analytics (optional)
analytics.enabled=false
analytics.provider=none

# Development/Debug (disable in production)
debug.mode=false
console.logging=false
source.maps=false

# Theme versioning
theme.version=2.2.0
last.updated=2024-01-20
compatibility.keycloak.min=22.0.0
compatibility.keycloak.max=26.x.x

# Custom properties for school branding
school.platform.name=My School Buddies
school.support.email=support@myschoolbuddies.com
school.privacy.url=https://myschoolbuddies.com/privacy
school.terms.url=https://myschoolbuddies.com/terms
school.help.url=https://myschoolbuddies.com/help

# Production deployment
production.ready=true
deployment.environment=production
cdn.enabled=false
monitoring.enabled=true
