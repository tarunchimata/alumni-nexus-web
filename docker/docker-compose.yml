
services:
  # Backend (Node.js/Express API)
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    env_file:
      - .env
    ports:
      - "3033:3033"
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    networks:
      - myschoolbuddies-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3033/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Frontend (React App with Nginx)
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - myschoolbuddies-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  backend_logs:
  backend_uploads:

networks:
  myschoolbuddies-network:
    driver: bridge
    name: myschoolbuddies-network
