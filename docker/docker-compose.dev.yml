version: '3.8'

services:
  # Backend (Node.js/Express API) - Development
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "3033:3033"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    networks:
      - alumni-nexus-network
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3033
    command: npm run dev

  # Frontend (React App) - Development
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    env_file:
      - ./backend/.env
    ports:
      - "5173:5173"  # Vite dev server
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./vite.config.ts:/app/vite.config.ts
    networks:
      - alumni-nexus-network
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:3033/api
      - VITE_KEYCLOAK_URL=${KEYCLOAK_URL}
      - VITE_KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - VITE_KEYCLOAK_CLIENT_ID=${KEYCLOAK_FRONTEND_CLIENT_ID}
    depends_on:
      - backend
    command: npm run dev

  # Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - alumni-nexus-network
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  alumni-nexus-network:
    driver: bridge

volumes:
  backend_logs:
  backend_uploads:
  redis_data:
